<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quizlet</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="topnav">
    <div class="topnav-left">
      <a href="#/" class="logo">Quizlet</a>
    </div>
    <div class="topnav-search">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.5" y2="16.5"/></svg>
      <input type="search" id="global-search" placeholder="Flash kartları, ders kitaplarını, soruları arayın" />
    </div>
    <div class="topnav-right">
      <button class="theme-btn" id="theme-toggle" title="Temayı değiştir">
        <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
      </button>
      <button class="create-btn" title="Oluştur">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      </button>
      <div class="avatar" title="hasan">H</div>
    </div>
  </header>

  <div class="shell">
    <nav class="sidebar" id="sidebar"></nav>
    <main id="view"></main>
  </div>

  <!-- Veri dosyaları -->
  <script src="data/words.js"></script>
  <script src="data/phrases.js"></script>
  <script src="data/irregular.js"></script>
  <script src="data/verbs.js"></script>
  <script src="data/grammar.js"></script>
  <script src="data/quiz.js"></script>
  <!-- Uygulama -->
  <script src="js/app.js"></script>
</body>
</html>
